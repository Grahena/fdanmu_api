name: Sync fork with upstream

on:
  schedule:
    - cron: '0 2 * * *'   # 每天新加坡时间早上10点
  workflow_dispatch:        # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main                        # ← 改成你自己的分支名
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Add upstream and sync
        run: |
          git remote add upstream https://github.com/huangxd-/danmu_api.git   # ← 改成上游地址
          git fetch upstream
          git rebase upstream/main         # ← 改成上游的分支名
          git push origin main --force-with-lease  # ← 改成你自己的分支名
